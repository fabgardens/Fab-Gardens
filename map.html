<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Work Map - Fab Gardens</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
body { font-family: 'Nunito Sans', sans-serif; margin:0; background:#FAF9F6; }
#map { height:500px; width:100%; margin-top:120px; }

/* simple fix for layout only */
.navbar { background:#3D7A5A; color:white; padding:15px; position:fixed; top:0; width:100%; z-index:1000; }
.jobs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:15px; padding:20px; }
.job-card { background:white; padding:10px; border-radius:10px; }
.job-card img { width:100%; border-radius:10px; }
.filter-btn.active { background:#3D7A5A; color:white; }
</style>
</head>

<body>

<div class="navbar">Fab Gardens Map</div>

<div id="map"></div>

<!-- FILTERS -->
<div style="text-align:center; padding:20px;">
<button class="filter-btn active" onclick="filterJobs('all', event)">All</button>
<button class="filter-btn" onclick="filterJobs('Ashtead', event)">Ashtead</button>
<button class="filter-btn" onclick="filterJobs('Leatherhead', event)">Leatherhead</button>
<button class="filter-btn" onclick="filterJobs('Epsom', event)">Epsom</button>
<button class="filter-btn" onclick="filterJobs('Reigate', event)">Reigate</button>
<button class="filter-btn" onclick="filterJobs('Farnham', event)">Farnham</button>
</div>

<!-- JOB GRID (shortened visual, your full cards stay same idea) -->
<div class="jobs-grid" id="jobsGrid"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ---------------- MAP ---------------- */
var map = L.map('map').setView([51.29, -0.26], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

var icon = L.divIcon({
    className:'',
    html:'<div style="background:#3D7A5A;width:26px;height:26px;border-radius:50%;border:3px solid white;"></div>',
    iconSize:[26,26],
    iconAnchor:[13,13]
});

/* ---------------- FIXED JOB DATA ---------------- */
var jobs = [
{lat:51.3103,lng:-0.2962,title:"Blocked Alleyway Becomes Accessible Again",location:"Ashtead",videoId:"5UyBhb6Xouk"},
{lat:51.3095,lng:-0.2939,title:"Pavement Makeover",location:"Ashtead",videoId:"_kK-YcWDEnM"},
{lat:51.3103,lng:-0.3177,title:"Restored Public Path",location:"Ashtead",videoId:"djWt9XqxCEo"},
{lat:51.3095,lng:-0.2939,title:"School Path Cleaned",location:"Ashtead",videoId:"LktubbvPEdo"},
{lat:51.3089,lng:-0.2947,title:"School Path Finished",location:"Ashtead",videoId:"sFY8_Q7k0To"},
{lat:51.3105,lng:-0.2975,title:"Garden Transformed",location:"Ashtead",videoId:"wYV6mwCKv4w"},

{lat:51.3018,lng:-0.3258,title:"Blocked Footpath Rescue",location:"Leatherhead",videoId:"FZtG8AQTFLE"},
{lat:51.2963,lng:-0.3325,title:"Moss Removal",location:"Leatherhead",videoId:"ztis-iabx24"},
{lat:51.3041,lng:-0.3351,title:"Overgrown Garden Help",location:"Leatherhead",videoId:"HfD6fzyYUQo"},
{lat:51.3088,lng:-0.3208,title:"Litter Pick",location:"Leatherhead",videoId:"TigTHnOkXbQ"},
{lat:51.3055,lng:-0.3313,title:"Blocked Path Safe Again",location:"Leatherhead",videoId:"iuOwQ7cgOdo"},
{lat:51.3051,lng:-0.3311,title:"Worst Pavement Fixed",location:"Leatherhead",videoId:"oYgo2RXjVDc"},
{lat:51.3041,lng:-0.3329,title:"Alley Restored",location:"Leatherhead",videoId:"kpTCCmeRgv0"},
{lat:51.3129,lng:-0.3278,title:"Road Signs Cleaned",location:"Leatherhead",videoId:"2GFrhRwmkNQ"},

{lat:51.3414,lng:-0.2603,title:"Epsom Hedge Clearance",location:"Epsom",videoId:"D4WQ5Wc_Vsg"},

{lat:51.2261,lng:-0.1960,title:"Dangerous Path Fixed",location:"Reigate",videoId:"yPss5A08gKU"},
{lat:51.2443,lng:-0.1789,title:"Dangerous Corner Fixed",location:"Reigate",videoId:"N-j-6kPOaFk"},
{lat:51.2265,lng:-0.1980,title:"Corner Makeover",location:"Reigate",videoId:"wZEFIt7vG24"},
{lat:51.2270,lng:-0.1990,title:"Blocked Path Cleared",location:"Reigate",videoId:"bUwUL_W3rpE"},

{lat:51.2360,lng:-0.2080,title:"Farnham Footpath Restored",location:"Farnham",videoId:"DXOFQKKQG1Y"},
{lat:51.2365,lng:-0.2090,title:"10 Year Overgrowth Cleared",location:"Farnham",videoId:"NsiSrVA92aQ"},
{lat:51.2370,lng:-0.2100,title:"6ft Path Reopened",location:"Farnham",videoId:"V25TBKklUPY"}
];

/* ---------------- MAP MARKERS ---------------- */
jobs.forEach(job=>{
    L.marker([job.lat,job.lng],{icon:icon})
    .addTo(map)
    .bindPopup(`
        <b>${job.title}</b><br>
        ${job.location}<br>
        <a target="_blank" href="https://www.youtube.com/watch?v=${job.videoId}">Watch</a>
    `);
});

/* ---------------- FILTER FIXED ---------------- */
function filterJobs(town, event){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');

    document.querySelectorAll('.job-card').forEach(card=>{
        if(town==='all' || card.dataset.town===town){
            card.style.display='block';
        } else {
            card.style.display='none';
        }
    });
}
</script>

</body>
</html>
